name: Knowledge Index Rebuild

on:
  push:
    branches: [main, dev]
    paths:
      - "knowledge/*.md"
  workflow_dispatch:

concurrency:
  group: knowledge-index-rebuild-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rebuild TF-IDF index
        run: node scripts/rebuild-knowledge-index.js

      - name: Check for index changes
        id: diff
        run: |
          if git diff --quiet knowledge/_index.json 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated index
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/_index.json
          git commit -m "chore: rebuild knowledge index [skip ci]"
          git push
